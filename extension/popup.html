<!DOCTYPE html>
<html lang="ru">
<head>
  <title>SearchHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 500px; height: 560px; display: flex; flex-direction: column; font-family: sans-serif; }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 4px 8px;
      background: #0d6efd;
    }
    #openApp {
      font-size: 12px;
      color: #fff;
      background: none;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
    }
    #openApp:hover { background: rgba(255,255,255,0.15); }
    iframe { flex: 1; width: 100%; border: none; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="openApp" title="Открыть в новой вкладке">↗ Открыть</button>
  </div>
  <iframe src="http://localhost:8000/"></iframe>
  <script src="popup.js"></script>
</body>
</html>
